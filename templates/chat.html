<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI客服助手</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f7fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: #10a37f;
            color: white;
            padding: 18px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        .message {
            margin-bottom: 16px;
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        .user-message {
            justify-content: flex-end;
        }
        .ai-message {
            justify-content: flex-start;
        }
        .system-message {
            justify-content: center;
        }
        .bubble {
            max-width: 80%;
            padding: 10px 16px;
            border-radius: 20px;
            word-wrap: break-word;
            font-size: 0.95rem;
            line-height: 1.4;
        }
        .user-message .bubble {
            background: #10a37f;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .ai-message .bubble {
            background: #e9ecef;
            color: #1e2a3a;
            border-bottom-left-radius: 4px;
        }
        .system-message .bubble {
            background: #e2e3e5;
            color: #6c757d;
            font-style: italic;
            text-align: center;
            font-size: 0.85rem;
        }
        .chat-input {
            display: flex;
            padding: 16px;
            background: white;
            border-top: 1px solid #dee2e6;
        }
        .chat-input input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ced4da;
            border-radius: 30px;
            outline: none;
            font-size: 1rem;
        }
        .chat-input input:focus {
            border-color: #10a37f;
        }
        .chat-input button {
            margin-left: 12px;
            padding: 0 20px;
            background: #10a37f;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
        }
        .chat-input button:hover {
            background: #0e8e6f;
        }
        .loading {
            text-align: center;
            color: #6c757d;
            padding: 10px;
            font-style: italic;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 600px) {
            .chat-container {
                height: 100vh;
                border-radius: 0;
            }
            .bubble {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">🤖 Shanghai Unionmetal Trading</div>
    <div class="chat-messages" id="messages">
        <div class="message ai-message">
            <div class="bubble">Welcome to Shanghai Unionmetal! What can I do for you?</div>
        </div>
    </div>
    <div class="chat-input">
        <input type="text" id="userInput" placeholder="输入你的问题..." autocomplete="off">
        <button onclick="sendMessage()">发送</button>
    </div>
</div>

<script>
    // 会话ID管理
    let sessionId = localStorage.getItem('chat_session_id');
    if (!sessionId) {
        sessionId = generateUUID();
        localStorage.setItem('chat_session_id', sessionId);
    }

    function generateUUID() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
            const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
            return v.toString(16);
        });
    }

    // 空闲计时器（5分钟）
    const IDLE_TIMEOUT = 5 * 60 * 1000;
    let idleTimer = null;

    function resetIdleTimer() {
        if (idleTimer) clearTimeout(idleTimer);
        idleTimer = setTimeout(onIdleTimeout, IDLE_TIMEOUT);
    }

    function onIdleTimeout() {
        addMessage("由于您长时间没有新的问题，本次对话已结束。您可以重新开始提问。", 'system');
        localStorage.removeItem('chat_session_id');
        sessionId = generateUUID();
        localStorage.setItem('chat_session_id', sessionId);
        resetIdleTimer();
    }

    // 轮询客服回复
    let pollInterval = null;

    function startPolling() {
        if (pollInterval) clearInterval(pollInterval);
        pollInterval = setInterval(async () => {
            if (!sessionId) return;
            try {
                const resp = await fetch(`/api/poll?session_id=${sessionId}`);
                const data = await resp.json();
                if (data.reply) {
                    addMessage(data.reply, 'ai');
                }
            } catch (err) {
                console.error('轮询失败:', err);
            }
        }, 3000);
    }

    // 发送消息
    async function sendMessage() {
        const input = document.getElementById('userInput');
        const message = input.value.trim();
        if (!message) return;

        resetIdleTimer();
        addMessage(message, 'user');
        input.value = '';

        const loadingDiv = addLoading();

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message, session_id: sessionId })
            });
            const data = await response.json();
            removeLoading(loadingDiv);

            if (data.reply) {
                addMessage(data.reply, 'ai');
                if (data.session_id && data.session_id !== sessionId) {
                    sessionId = data.session_id;
                    localStorage.setItem('chat_session_id', sessionId);
                }
            } else if (data.error) {
                addMessage('抱歉：' + data.error, 'ai');
            } else {
                addMessage('抱歉，服务出错了，请稍后再试。', 'ai');
            }
        } catch (error) {
            removeLoading(loadingDiv);
            addMessage('网络错误，请检查连接。', 'ai');
        }
    }

    function addMessage(text, sender) {
        const messagesDiv = document.getElementById('messages');
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${sender}-message`;
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerText = text;
        messageDiv.appendChild(bubble);
        messagesDiv.appendChild(messageDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function addLoading() {
        const messagesDiv = document.getElementById('messages');
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'message ai-message';
        loadingDiv.innerHTML = '<div class="bubble">🤔 思考中...</div>';
        messagesDiv.appendChild(loadingDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        return loadingDiv;
    }

    function removeLoading(loadingDiv) {
        if (loadingDiv) loadingDiv.remove();
    }

    document.getElementById('userInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') sendMessage();
    });

    window.addEventListener('load', function() {
        resetIdleTimer();
        startPolling();
    });

    window.addEventListener('beforeunload', function() {
        if (pollInterval) clearInterval(pollInterval);
    });
</script>
</body>
</html>
